
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KLE — Acesso Financeiro</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --navy: #0B1F30;
  --gold: #C8992A;
  --cream: #F5F1EA;
  --white: #FFFFFF;
  --border: #DDD8CF;
  --muted: #6B7A8A;
  --red: #B91C1C;
  --red-bg: #FEF2F2;
}

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--navy);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
}

/* Background pattern */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: radial-gradient(circle, rgba(200,153,42,0.06) 1px, transparent 1px);
  background-size: 32px 32px;
  z-index: 0;
}

body::after {
  content: '';
  position: fixed;
  bottom: -200px; right: -200px;
  width: 600px; height: 600px;
  background: radial-gradient(circle, rgba(200,153,42,0.08) 0%, transparent 70%);
  z-index: 0;
}

.login-wrap {
  position: relative;
  z-index: 1;
  width: 100%;
  max-width: 420px;
  padding: 0 24px;
}

.login-card {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 20px;
  padding: 40px 36px;
  backdrop-filter: blur(12px);
}

.logo-area {
  text-align: center;
  margin-bottom: 36px;
}

.logo-badge {
  display: inline-block;
  background: var(--gold);
  color: var(--navy);
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 15px;
  padding: 7px 18px;
  border-radius: 8px;
  letter-spacing: 1px;
  margin-bottom: 14px;
}

.logo-title {
  font-family: 'Syne', sans-serif;
  font-size: 22px;
  font-weight: 700;
  color: white;
  margin-bottom: 4px;
}

.logo-sub {
  font-size: 13px;
  color: rgba(255,255,255,0.35);
  letter-spacing: 1px;
}

.field {
  margin-bottom: 16px;
}

label {
  display: block;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.45);
  margin-bottom: 8px;
}

.input-wrap {
  position: relative;
}

input[type="password"],
input[type="text"] {
  width: 100%;
  padding: 13px 44px 13px 16px;
  background: rgba(255,255,255,0.07);
  border: 1.5px solid rgba(255,255,255,0.1);
  border-radius: 10px;
  font-family: 'DM Sans', sans-serif;
  font-size: 15px;
  color: white;
  outline: none;
  transition: border-color 0.2s, background 0.2s;
  letter-spacing: 2px;
}

input[type="password"]:focus,
input[type="text"]:focus {
  border-color: var(--gold);
  background: rgba(255,255,255,0.10);
}

input::placeholder {
  color: rgba(255,255,255,0.2);
  letter-spacing: 0;
}

.toggle-pw {
  position: absolute;
  right: 14px;
  top: 50%;
  transform: translateY(-50%);
  cursor: pointer;
  font-size: 16px;
  opacity: 0.4;
  transition: opacity 0.2s;
  user-select: none;
}
.toggle-pw:hover { opacity: 0.8; }

.btn-login {
  width: 100%;
  padding: 14px;
  background: var(--gold);
  color: var(--navy);
  border: none;
  border-radius: 10px;
  font-family: 'DM Sans', sans-serif;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
  margin-top: 8px;
  letter-spacing: 0.3px;
}

.btn-login:hover { background: #E8B84B; transform: translateY(-1px); }
.btn-login:active { transform: translateY(0); }
.btn-login:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

.error-msg {
  display: none;
  background: var(--red-bg);
  border: 1px solid rgba(185,28,28,0.25);
  color: var(--red);
  font-size: 13px;
  font-weight: 500;
  padding: 10px 14px;
  border-radius: 8px;
  margin-bottom: 16px;
  text-align: center;
}

.error-msg.show { display: block; }

.attempts-msg {
  text-align: center;
  font-size: 11.5px;
  color: rgba(255,255,255,0.25);
  margin-top: 16px;
}

.lock-screen {
  display: none;
  text-align: center;
  padding: 20px 0;
}

.lock-icon { font-size: 40px; margin-bottom: 12px; }
.lock-title {
  font-family: 'Syne', sans-serif;
  font-size: 16px;
  font-weight: 700;
  color: var(--red);
  margin-bottom: 6px;
}
.lock-sub { font-size: 13px; color: rgba(255,255,255,0.35); }
.lock-countdown {
  font-size: 28px;
  font-weight: 700;
  color: white;
  margin: 16px 0;
  font-family: 'Syne', sans-serif;
}

.footer-note {
  text-align: center;
  margin-top: 20px;
  font-size: 11.5px;
  color: rgba(255,255,255,0.18);
}
</style>
</head>
<body>

<div class="login-wrap">
  <div class="login-card">

    <div class="logo-area">
      <div class="logo-badge">KLE</div>
      <div class="logo-title">Painel Financeiro</div>
      <div class="logo-sub">ACESSO RESTRITO · EQUIPE INTERNA</div>
    </div>

    <!-- Login form -->
    <div id="login-form">
      <div class="error-msg" id="error-msg">Senha incorreta. Tente novamente.</div>

      <div class="field">
        <label>Senha de acesso</label>
        <div class="input-wrap">
          <input type="password" id="pw-input" placeholder="••••••••" autocomplete="current-password"
            onkeydown="if(event.key==='Enter')tryLogin()">
          <span class="toggle-pw" id="toggle-pw" onclick="togglePw()">👁</span>
        </div>
      </div>

      <button class="btn-login" id="btn-login" onclick="tryLogin()">
        Entrar no Painel
      </button>

      <div class="attempts-msg" id="attempts-msg"></div>
    </div>

    <!-- Lockout screen -->
    <div class="lock-screen" id="lock-screen">
      <div class="lock-icon">🔒</div>
      <div class="lock-title">Acesso Bloqueado</div>
      <div class="lock-sub">Muitas tentativas incorretas. Aguarde:</div>
      <div class="lock-countdown" id="countdown">05:00</div>
      <div class="lock-sub">O acesso será liberado automaticamente.</div>
    </div>

  </div>
  <div class="footer-note">portal.grupokle.com.br · uso interno KLE</div>
</div>

<script>
// Hash SHA-256 da senha KLE@2026
const HASH_CORRETO = 'e5cb7c2c38e9811c66c3fc46aca5e529fa43401a34905ea19ec97561d0685146';
const MAX_TENTATIVAS = 5;
const LOCKOUT_SEGUNDOS = 300; // 5 minutos
const STORAGE_KEY = 'kle_auth';
const LOCKOUT_KEY = 'kle_lockout';

let tentativas = parseInt(sessionStorage.getItem('kle_tentativas') || '0');

// Verifica se já está autenticado
if (sessionStorage.getItem(STORAGE_KEY) === 'ok') {
  window.location.href = 'painel.html';
}

// Verifica lockout
function checkLockout() {
  const lockUntil = parseInt(localStorage.getItem(LOCKOUT_KEY) || '0');
  const agora = Date.now();
  if (lockUntil > agora) {
    showLockout(Math.ceil((lockUntil - agora) / 1000));
    return true;
  }
  return false;
}

function showLockout(segundosRestantes) {
  document.getElementById('login-form').style.display = 'none';
  document.getElementById('lock-screen').style.display = 'block';
  let s = segundosRestantes;
  const interval = setInterval(() => {
    s--;
    const min = Math.floor(s / 60).toString().padStart(2, '0');
    const sec = (s % 60).toString().padStart(2, '0');
    document.getElementById('countdown').textContent = `${min}:${sec}`;
    if (s <= 0) {
      clearInterval(interval);
      localStorage.removeItem(LOCKOUT_KEY);
      sessionStorage.setItem('kle_tentativas', '0');
      tentativas = 0;
      document.getElementById('lock-screen').style.display = 'none';
      document.getElementById('login-form').style.display = 'block';
    }
  }, 1000);
  // Contador inicial
  const min = Math.floor(s / 60).toString().padStart(2, '0');
  const sec = (s % 60).toString().padStart(2, '0');
  document.getElementById('countdown').textContent = `${min}:${sec}`;
}

async function sha256(msg) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(msg));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
}

async function tryLogin() {
  if (checkLockout()) return;

  const pw = document.getElementById('pw-input').value;
  if (!pw) return;

  const btn = document.getElementById('btn-login');
  btn.disabled = true;
  btn.textContent = 'Verificando...';

  const hash = await sha256(pw);

  if (hash === HASH_CORRETO) {
    sessionStorage.setItem(STORAGE_KEY, 'ok');
    sessionStorage.setItem('kle_tentativas', '0');
    btn.textContent = '✓ Acesso liberado';
    btn.style.background = '#1A7A4A';
    btn.style.color = 'white';
    setTimeout(() => { window.location.href = 'painel.html'; }, 600);
  } else {
    tentativas++;
    sessionStorage.setItem('kle_tentativas', tentativas.toString());
    btn.disabled = false;
    btn.textContent = 'Entrar no Painel';

    const restantes = MAX_TENTATIVAS - tentativas;
    const errorEl = document.getElementById('error-msg');
    errorEl.classList.add('show');

    if (tentativas >= MAX_TENTATIVAS) {
      localStorage.setItem(LOCKOUT_KEY, (Date.now() + LOCKOUT_SEGUNDOS * 1000).toString());
      showLockout(LOCKOUT_SEGUNDOS);
    } else {
      errorEl.textContent = `Senha incorreta. ${restantes} tentativa${restantes !== 1 ? 's' : ''} restante${restantes !== 1 ? 's' : ''}.`;
      document.getElementById('attempts-msg').textContent =
        restantes <= 2 ? `⚠️ Após ${MAX_TENTATIVAS} tentativas o acesso será bloqueado por 5 min.` : '';
      document.getElementById('pw-input').value = '';
      document.getElementById('pw-input').focus();
    }
  }
}

function togglePw() {
  const input = document.getElementById('pw-input');
  const toggle = document.getElementById('toggle-pw');
  if (input.type === 'password') {
    input.type = 'text';
    toggle.textContent = '🙈';
  } else {
    input.type = 'password';
    toggle.textContent = '👁';
  }
}

// Foco automático
document.getElementById('pw-input').focus();
checkLockout();
</script>
</body>
</html>
