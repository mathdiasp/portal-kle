
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal de Documentos — KLE</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy: #0f2336;
    --navy-mid: #1B4F72;
    --navy-light: #2874a6;
    --cream: #f7f4ef;
    --cream-dark: #ede9e1;
    --gold: #c8992a;
    --text: #1a1a1a;
    --text-muted: #6b6b6b;
    --white: #ffffff;
    --success: #1e7e4a;
    --success-bg: #edf7f1;
    --error: #b91c1c;
    --error-bg: #fef2f2;
    --radius: 12px;
    --shadow-lg: 0 12px 48px rgba(15,35,54,0.16);
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0;
    position: relative;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 420px;
    background: var(--navy);
    clip-path: ellipse(120% 100% at 50% 0%);
    z-index: 0;
  }

  body::after {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 420px;
    background-image: radial-gradient(circle, rgba(255,255,255,0.04) 1px, transparent 1px);
    background-size: 28px 28px;
    z-index: 0;
  }

  .wrapper {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 560px;
    padding: 2.5rem 1.5rem 4rem;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .header {
    text-align: center;
    margin-bottom: 2rem;
    animation: fadeDown 0.5s ease both;
  }

  .logo-wrap {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 1.5rem;
  }

  .logo-mark {
    background: var(--gold);
    color: var(--navy);
    font-family: 'DM Serif Display', serif;
    font-size: 14px;
    padding: 6px 14px;
    border-radius: 6px;
    letter-spacing: 1px;
  }

  .logo-name {
    color: var(--white);
    font-size: 13px;
    font-weight: 300;
    letter-spacing: 2px;
    text-transform: uppercase;
    opacity: 0.7;
  }

  .header h1 {
    font-family: 'DM Serif Display', serif;
    color: var(--white);
    font-size: 2rem;
    font-weight: 400;
    line-height: 1.2;
    margin-bottom: 0.5rem;
  }

  .header p {
    color: rgba(255,255,255,0.55);
    font-size: 14px;
    font-weight: 300;
  }

  .card {
    background: var(--white);
    border-radius: 20px;
    padding: 2rem;
    width: 100%;
    box-shadow: var(--shadow-lg);
    animation: fadeUp 0.5s 0.1s ease both;
  }

  .card-title {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: var(--navy-mid);
    margin-bottom: 1.5rem;
    padding-bottom: 1rem;
    border-bottom: 1.5px solid var(--cream-dark);
  }

  .field { margin-bottom: 1.25rem; }

  label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-muted);
    letter-spacing: 0.8px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  input {
    width: 100%;
    padding: 13px 16px;
    border: 1.5px solid var(--cream-dark);
    border-radius: var(--radius);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    color: var(--text);
    background: var(--cream);
    transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
    outline: none;
  }

  input:focus {
    border-color: var(--navy-mid);
    background: var(--white);
    box-shadow: 0 0 0 3px rgba(27,79,114,0.08);
  }

  input::placeholder { color: #bbb; }

  .field-hint { font-size: 11px; color: #aaa; margin-top: 5px; }

  .btn {
    width: 100%;
    padding: 14px;
    background: var(--navy);
    color: var(--white);
    border: none;
    border-radius: var(--radius);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    margin-top: 0.5rem;
  }

  .btn:hover { background: var(--navy-mid); }
  .btn:active { transform: scale(0.99); }
  .btn:disabled { background: #c0c0c0; cursor: not-allowed; }

  .btn-inner { display: flex; align-items: center; justify-content: center; gap: 8px; }

  .spinner {
    width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: none;
  }

  .alert {
    border-radius: var(--radius);
    padding: 12px 14px;
    font-size: 13px;
    margin-top: 1rem;
    display: none;
    line-height: 1.5;
  }
  .alert.ok { background: var(--success-bg); color: var(--success); border: 1px solid #a7d9bc; }
  .alert.err { background: var(--error-bg); color: var(--error); border: 1px solid #fca5a5; }

  /* Result */
  .result { display: none; animation: fadeUp 0.3s ease both; }

  .result-header {
    padding-bottom: 1rem;
    margin-bottom: 1rem;
    border-bottom: 1.5px solid var(--cream-dark);
  }

  .result-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    color: var(--navy-mid);
    margin-bottom: 3px;
  }

  .result-empresa {
    font-size: 16px;
    font-weight: 500;
    color: var(--text);
  }

  .result-cnpj {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 2px;
  }

  .result-count {
    display: inline-block;
    background: var(--cream);
    border-radius: 20px;
    padding: 3px 10px;
    font-size: 12px;
    color: var(--navy-mid);
    font-weight: 500;
    margin-top: 8px;
  }

  /* Pedido item */
  .pedido-item {
    border: 1.5px solid var(--cream-dark);
    border-radius: var(--radius);
    margin-bottom: 10px;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .pedido-item:hover { border-color: #b0c8dd; }

  .pedido-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px;
    background: var(--cream);
    cursor: pointer;
    user-select: none;
  }

  .pedido-header:hover { background: #ede9e1; }

  .pedido-info { display: flex; align-items: center; gap: 12px; }

  .pedido-num {
    background: var(--navy);
    color: var(--white);
    font-size: 11px;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 6px;
    letter-spacing: 0.5px;
  }

  .pedido-meta { }

  .pedido-data {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
  }

  .pedido-valor {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 1px;
  }

  .pedido-chevron {
    color: var(--navy-mid);
    font-size: 18px;
    transition: transform 0.2s;
    line-height: 1;
  }

  .pedido-chevron.open { transform: rotate(180deg); }

  .pedido-docs {
    display: none;
    padding: 12px 16px;
    border-top: 1px solid var(--cream-dark);
    background: var(--white);
    gap: 8px;
    flex-direction: column;
  }

  .pedido-docs.open { display: flex; }

  .doc-btn {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 14px;
    border-radius: 10px;
    border: 1.5px solid var(--cream-dark);
    text-decoration: none;
    transition: border-color 0.2s, background 0.2s;
    cursor: pointer;
  }

  .doc-btn:hover { border-color: var(--navy-mid); background: #f0f6fb; }

  .doc-btn.disabled {
    opacity: 0.4;
    cursor: not-allowed;
    pointer-events: none;
  }

  .doc-btn-left { display: flex; align-items: center; gap: 10px; }

  .doc-ico {
    width: 32px; height: 32px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
  }

  .doc-ico.boleto { background: #fff3cd; }
  .doc-ico.nf { background: #d4edda; }

  .doc-btn-name { font-size: 13px; font-weight: 500; color: var(--text); }
  .doc-btn-sub { font-size: 11px; color: var(--text-muted); margin-top: 1px; }

  .doc-badge {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.4px;
    text-transform: uppercase;
    padding: 3px 8px;
    border-radius: 20px;
  }

  .badge-ok { background: #d4edda; color: #1e7e4a; }
  .badge-no { background: #e9ecef; color: #888; }

  .btn-nova {
    width: 100%;
    padding: 11px;
    background: transparent;
    color: var(--navy-mid);
    border: 1.5px solid var(--cream-dark);
    border-radius: var(--radius);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    margin-top: 1rem;
    transition: border-color 0.2s, background 0.2s;
  }

  .btn-nova:hover { border-color: var(--navy-mid); background: var(--cream); }

  .footer {
    margin-top: 2rem;
    text-align: center;
    font-size: 12px;
    color: rgba(255,255,255,0.3);
    animation: fadeUp 0.5s 0.3s ease both;
  }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 560px) {
    .wrapper { padding: 2rem 1rem 3rem; }
    .card { padding: 1.5rem; }
    .header h1 { font-size: 1.6rem; }
  }
</style>
</head>
<body>
<div class="wrapper">

  <div class="header">
    <div class="logo-wrap">
      <span class="logo-mark">KLE</span>
      <span class="logo-name">Kit Lanche Express</span>
    </div>
    <h1>Portal de Documentos</h1>
    <p>Acesse seus boletos e notas fiscais</p>
  </div>

  <div class="card">

    <!-- Formulario -->
    <div id="form-section">
      <div class="card-title">Consulta de documentos</div>
      <div class="field">
        <label for="cnpj">CNPJ da empresa</label>
        <input type="text" id="cnpj" placeholder="00.000.000/0001-00" maxlength="18" autocomplete="off">
        <div class="field-hint">Informe o CNPJ cadastrado no pedido</div>
      </div>
      <button class="btn" id="btn-buscar" onclick="buscarCNPJ()">
        <div class="btn-inner">
          <div class="spinner" id="spinner"></div>
          <span id="btn-text">Consultar documentos</span>
        </div>
      </button>
      <div class="alert" id="alert"></div>
    </div>

    <!-- Resultado -->
    <div class="result" id="result">
      <div class="card-title">Documentos encontrados</div>
      <div class="result-header">
        <div class="result-label">Empresa</div>
        <div class="result-empresa" id="res-empresa"></div>
        <div class="result-cnpj" id="res-cnpj"></div>
        <span class="result-count" id="res-count"></span>
      </div>

      <div id="pedidos-list"></div>

      <button class="btn-nova" onclick="novaBusca()">Fazer nova consulta</button>
    </div>

  </div>

  <div class="footer">KLE &middot; Uso exclusivo para clientes &middot; Documentos gerados pelo Maxiprod</div>
</div>

<script>
// ============================================================
// BASE DE DADOS — carregada dinamicamente do base.json (GitHub Pages)
// Atualizada diariamente pelo Make às 04:00
// ============================================================
var BASE = null;
var BASE_CARREGADA = false;
var BASE_ERRO = false;

function excelDataParaString(serial) {
  if (!serial || isNaN(serial)) return serial || '';
  var d = new Date(Math.round((serial - 25569) * 86400 * 1000));
  var dd = d.getUTCDate().toString().padStart(2,'0');
  var mm = (d.getUTCMonth()+1).toString().padStart(2,'0');
  return dd + '/' + mm + '/' + d.getUTCFullYear();
}

function formatarValor(v) {
  if (!v && v !== 0) return '';
  var n = parseFloat(v);
  if (isNaN(n)) return String(v);
  return 'R$ ' + n.toFixed(2).replace('.', ',').replace(/\B(?=(\d{3})+(?!\d))/g, '.');
}

function processarLinhas(linhas) {
  var base = {};
  linhas.forEach(function(item) {
    var v = item.values || item;
    var cnpj = String(v['0'] || '').replace(/\D/g,'');
    if (!cnpj || cnpj.length < 14) return;
    if (!base[cnpj]) {
      base[cnpj] = { empresa: String(v['1'] || ''), pedidos: [] };
    }
    base[cnpj].pedidos.push({
      pedido:    String(v['3'] || ''),
      entrega:   excelDataParaString(v['5']),
      valor:     formatarValor(v['6']),
      nf:        String(v['10'] || ''),
      valorNF:   formatarValor(v['12']),
      urlBoleto: v['7'] || '',
      urlNF:     v['13'] || ''
    });
  });
  return base;
}

fetch('base.json?t=' + Date.now())
  .then(function(r) {
    if (!r.ok) throw new Error('HTTP ' + r.status);
    return r.json();
  })
  .then(function(data) {
    BASE = processarLinhas(data);
    BASE_CARREGADA = true;
  })
  .catch(function() {
    BASE_ERRO = true;
    BASE_CARREGADA = true;
  });

function formatarCNPJ(v) {
  v = v.replace(/\D/g, '').slice(0, 14);
  if (v.length <= 2) return v;
  if (v.length <= 5) return v.slice(0,2) + '.' + v.slice(2);
  if (v.length <= 8) return v.slice(0,2) + '.' + v.slice(2,5) + '.' + v.slice(5);
  if (v.length <= 12) return v.slice(0,2) + '.' + v.slice(2,5) + '.' + v.slice(5,8) + '/' + v.slice(8);
  return v.slice(0,2) + '.' + v.slice(2,5) + '.' + v.slice(5,8) + '/' + v.slice(8,12) + '-' + v.slice(12);
}

document.getElementById('cnpj').addEventListener('input', function() {
  this.value = formatarCNPJ(this.value);
});

document.getElementById('cnpj').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') buscarCNPJ();
});

function buscarCNPJ() {
  var cnpj = document.getElementById('cnpj').value.replace(/\D/g, '');
  if (cnpj.length !== 14) { showAlert('Informe um CNPJ valido com 14 digitos.', 'err'); return; }

  setLoading(true);
  showAlert('', '');

  function executarBusca() {
    if (!BASE_CARREGADA) {
      setTimeout(executarBusca, 200);
      return;
    }

    setLoading(false);

    if (BASE_ERRO) {
      showAlert('Erro ao carregar a base de documentos. Tente novamente em instantes ou entre em contato com o financeiro KLE.', 'err');
      return;
    }

    var dados = BASE[cnpj];

    if (!dados || !dados.pedidos || dados.pedidos.length === 0) {
      showAlert('Nenhum documento encontrado para este CNPJ. Verifique o CNPJ informado ou entre em contato com o financeiro KLE.', 'err');
      return;
    }

    document.getElementById('res-empresa').textContent = dados.empresa;
    document.getElementById('res-cnpj').textContent = formatarCNPJ(cnpj);
    document.getElementById('res-count').textContent = dados.pedidos.length + (dados.pedidos.length === 1 ? ' pedido encontrado' : ' pedidos encontrados');

    var lista = document.getElementById('pedidos-list');
    lista.innerHTML = '';

    dados.pedidos.forEach(function(p, idx) {
      var item = document.createElement('div');
      item.className = 'pedido-item';

      var temBoleto = !!p.urlBoleto;
      var temNF = !!p.urlNF;

      item.innerHTML =
        '<div class="pedido-header" onclick="togglePedido(' + idx + ')">' +
          '<div class="pedido-info">' +
            '<span class="pedido-num">Pedido #' + p.pedido + '</span>' +
            '<div class="pedido-meta">' +
              '<div class="pedido-data">Entrega: ' + p.entrega + '</div>' +
              '<div class="pedido-valor">' + p.valor + '</div>' +
            '</div>' +
          '</div>' +
          '<span class="pedido-chevron" id="chev-' + idx + '">&#8964;</span>' +
        '</div>' +
        '<div class="pedido-docs" id="docs-' + idx + '">' +
          '<a class="doc-btn' + (temBoleto ? '' : ' disabled') + '" ' + (temBoleto ? 'href="' + p.urlBoleto + '" target="_blank"' : '') + '>' +
            '<div class="doc-btn-left">' +
              '<div class="doc-ico boleto">&#128190;</div>' +
              '<div>' +
                '<div class="doc-btn-name">Boleto bancario</div>' +
                '<div class="doc-btn-sub">' + (temBoleto ? 'Clique para baixar' : 'Indisponivel — contate o financeiro') + '</div>' +
              '</div>' +
            '</div>' +
            '<span class="doc-badge ' + (temBoleto ? 'badge-ok">Disponivel' : 'badge-no">Indisponivel') + '</span>' +
          '</a>' +
          '<a class="doc-btn' + (temNF ? '' : ' disabled') + '" ' + (temNF ? 'href="' + p.urlNF + '" target="_blank"' : '') + '>' +
            '<div class="doc-btn-left">' +
              '<div class="doc-ico nf">&#128196;</div>' +
              '<div>' +
                '<div class="doc-btn-name">Nota fiscal (DANFE)</div>' +
                '<div class="doc-btn-sub">' + (temNF ? 'Clique para baixar' : 'Indisponivel — contate o financeiro') + '</div>' +
              '</div>' +
            '</div>' +
            '<span class="doc-badge ' + (temNF ? 'badge-ok">Disponivel' : 'badge-no">Indisponivel') + '</span>' +
          '</a>' +
        '</div>';

      lista.appendChild(item);
    });

    document.getElementById('form-section').style.display = 'none';
    document.getElementById('result').style.display = 'block';
  }

  executarBusca();
}

function togglePedido(idx) {
  var docs = document.getElementById('docs-' + idx);
  var chev = document.getElementById('chev-' + idx);
  var isOpen = docs.classList.contains('open');
  docs.classList.toggle('open', !isOpen);
  chev.classList.toggle('open', !isOpen);
}

function novaBusca() {
  document.getElementById('cnpj').value = '';
  document.getElementById('result').style.display = 'none';
  document.getElementById('form-section').style.display = 'block';
  document.getElementById('pedidos-list').innerHTML = '';
  showAlert('', '');
  document.getElementById('cnpj').focus();
}

function setLoading(on) {
  document.getElementById('btn-buscar').disabled = on;
  document.getElementById('spinner').style.display = on ? 'block' : 'none';
  document.getElementById('btn-text').textContent = on ? 'Consultando...' : 'Consultar documentos';
}

function showAlert(msg, type) {
  var el = document.getElementById('alert');
  el.textContent = msg;
  el.className = 'alert ' + type;
  el.style.display = msg ? 'block' : 'none';
}
</script>
</body>
</html>
