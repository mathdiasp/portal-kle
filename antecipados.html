
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KLE · Campanha Antecipados</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{
  --green:#2d9b4e;--green-light:#e8f5ed;--green-mid:#b8e0c4;--green-dark:#1e6b35;
  --bg:#f5f6f8;--white:#ffffff;--border:#e4e7ec;--border-strong:#c8cdd6;
  --text:#111827;--text-secondary:#4b5563;--text-tertiary:#9ca3af;
  --red:#dc2626;--red-light:#fef2f2;
  --yellow:#d97706;--yellow-light:#fffbeb;
  --blue:#2563eb;--blue-light:#eff6ff;
  --amber:#b45309;--amber-light:#fef3c7;
  --shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.05);
  --shadow-md:0 4px 6px rgba(0,0,0,.07),0 2px 4px rgba(0,0,0,.05);
  --r:10px;--r-sm:6px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
/* ── RESET ISOLADO DO PORTAL ── */
*::before,*::after{content:none!important;}
html{scroll-behavior:smooth;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.5;}

/* ── LOGIN ── */
#loginScreen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:linear-gradient(135deg,#f0fdf4 0%,#e8f5ed 50%,#f5f6f8 100%);}
.lc{background:var(--white);border:1px solid var(--border);border-radius:16px;padding:40px;width:100%;max-width:380px;box-shadow:var(--shadow-md);text-align:center;}
.lc-logo{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:8px;}
.lc-logo-dot{width:36px;height:36px;background:var(--green);border-radius:8px;display:flex;align-items:center;justify-content:center;}
.lc-logo-dot svg{width:20px;height:20px;fill:white;}
.lc-brand{font-size:1.1rem;font-weight:700;color:var(--text);}
.lc-brand span{color:var(--green);}
.lc p{color:var(--text-secondary);font-size:.85rem;margin-bottom:24px;}
.lc input{background:var(--bg);border:1px solid var(--border);border-radius:var(--r-sm);padding:11px 14px;color:var(--text);font-family:'DM Mono',monospace;font-size:.88rem;width:100%;outline:none;transition:border-color .2s;margin-bottom:12px;}
.lc input:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(45,155,78,.1);}
.lc-btn{width:100%;background:var(--green);color:white;border:none;padding:11px;border-radius:var(--r-sm);font-family:'Inter',sans-serif;font-weight:600;font-size:.9rem;cursor:pointer;transition:all .2s;}
.lc-btn:hover{background:var(--green-dark);}
.lc-err{color:var(--red);font-size:.8rem;margin-top:10px;display:none;background:var(--red-light);padding:8px 12px;border-radius:var(--r-sm);}

/* ── APP ── */
#app{display:none;}

/* ── NAV ── */
nav{background:var(--white);border-bottom:1px solid var(--border);padding:0 28px;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:200;box-shadow:var(--shadow);}
.nav-brand{display:flex;align-items:center;gap:9px;}
.nav-logo-box{width:28px;height:28px;background:var(--green);border-radius:6px;display:flex;align-items:center;justify-content:center;}
.nav-logo-box svg{width:16px;height:16px;fill:white;}
.nav-brand-name{font-weight:700;font-size:.95rem;color:var(--text);}
.nav-brand-name span{color:var(--green);}
.tabs{display:flex;gap:2px;}
.tab{font-size:.8rem;font-weight:500;padding:6px 14px;border-radius:var(--r-sm);border:none;background:transparent;color:var(--text-secondary);cursor:pointer;transition:all .15s;font-family:'Inter',sans-serif;}
.tab:hover{background:var(--bg);color:var(--text);}
.tab.on{background:var(--green-light);color:var(--green-dark);font-weight:600;}
.nright{display:flex;gap:8px;align-items:center;}
.ts{font-size:.75rem;color:var(--text-tertiary);padding:4px 10px;background:var(--bg);border:1px solid var(--border);border-radius:var(--r-sm);}
.nbtn{background:var(--white);border:1px solid var(--border);color:var(--text-secondary);padding:6px 12px;border-radius:var(--r-sm);font-family:'Inter',sans-serif;font-size:.78rem;font-weight:500;cursor:pointer;transition:all .15s;box-shadow:var(--shadow);}
.nbtn:hover{border-color:var(--border-strong);color:var(--text);}
.nbtn.primary{background:var(--green);border-color:var(--green);color:white;font-weight:600;}
.nbtn.primary:hover{background:var(--green-dark);}

/* ── MAIN ── */
main{max-width:1200px;margin:0 auto;padding:24px;}
.page{display:none;}.page.on{display:block;}

/* ── ADM ── */
.adm-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;align-items:start;}
@media(max-width:720px){.adm-grid{grid-template-columns:1fr;}}
.card{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:20px 22px;box-shadow:var(--shadow);}
.card-title{font-size:.82rem;font-weight:600;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:.05em;margin-bottom:14px;display:flex;align-items:center;gap:6px;}

.up{border:2px dashed var(--border-strong);border-radius:var(--r-sm);padding:28px 20px;text-align:center;cursor:pointer;transition:border-color .2s,background .2s;background:var(--bg);}
.up:hover,.up.drag{border-color:var(--green);background:var(--green-light);}
.up-icon{font-size:26px;margin-bottom:6px;display:block;}
.up p{font-size:.82rem;color:var(--text-secondary);font-weight:500;}
.up p strong{color:var(--green);}
.up small{font-size:.75rem;color:var(--text-tertiary);margin-top:3px;display:block;}
.up input{display:none;}
.st{display:none;align-items:center;gap:6px;font-size:.78rem;font-weight:600;color:var(--green-dark);background:var(--green-light);border-radius:var(--r-sm);padding:7px 10px;margin-top:10px;}
.st.show{display:flex;}
.st-dot{width:7px;height:7px;border-radius:50%;background:var(--green);flex-shrink:0;}

.filter-group{margin-bottom:12px;}
.filter-label{font-size:.75rem;font-weight:600;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:.04em;margin-bottom:5px;display:block;}
.filter-select{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:var(--r-sm);font-size:.82rem;font-weight:500;color:var(--text);background:var(--bg);font-family:'Inter',sans-serif;cursor:pointer;outline:none;}
.filter-select:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(45,155,78,.08);}

.info-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border);font-size:.82rem;}
.info-row:last-child{border-bottom:none;}
.info-key{color:var(--text-secondary);}
.info-val{font-weight:600;color:var(--text);}
.info-val.green{color:var(--green-dark);}

/* ── DASH ── */
.section-title{font-size:.82rem;font-weight:600;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:.05em;margin-bottom:12px;}

/* KPIs */
.kgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px;}
@media(max-width:800px){.kgrid{grid-template-columns:repeat(2,1fr);}}
.kpi{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:16px 18px;box-shadow:var(--shadow);}
.kpi-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.klbl{font-size:.7rem;font-weight:600;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:.05em;}
.kicon{width:30px;height:30px;border-radius:var(--r-sm);display:flex;align-items:center;justify-content:center;font-size:14px;}
.kval{font-size:1.55rem;font-weight:700;line-height:1;margin-bottom:3px;}
.ksub{font-size:.72rem;color:var(--text-tertiary);}
.kpi.green .kval{color:var(--green-dark);}.kpi.green .kicon{background:var(--green-light);}
.kpi.blue  .kval{color:var(--blue);}.kpi.blue .kicon{background:var(--blue-light);}
.kpi.amber .kval{color:var(--amber);}.kpi.amber .kicon{background:var(--amber-light);}

/* RANKING TABLE */
.rtable{background:var(--white);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--shadow);margin-bottom:20px;overflow:hidden;}
.rtable-head{display:grid;grid-template-columns:44px 1fr 110px 120px 130px 110px;align-items:center;padding:9px 16px;background:var(--bg);border-bottom:1px solid var(--border);}
.rth{font-size:.7rem;font-weight:600;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:.04em;}
.rth.right{text-align:right;}
.rrow{display:grid;grid-template-columns:44px 1fr 110px 120px 130px 110px;align-items:center;padding:12px 16px;border-bottom:1px solid var(--border);transition:background .1s;}
.rrow:last-child{border-bottom:none;}
.rrow:hover{background:#fafbfc;}
.rrow.first{border-left:3px solid var(--green);}

/* pos */
.rpos{font-size:.85rem;font-weight:700;color:var(--text-tertiary);text-align:center;}
/* vendor */
.rvendor{display:flex;align-items:center;gap:10px;}
.rav{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;}
.rname{font-size:.88rem;font-weight:600;color:var(--text);}
.rmeta{display:flex;align-items:center;gap:5px;margin-top:2px;}
/* pmr badge */
.pmrb{display:inline-flex;align-items:center;padding:1px 7px;border-radius:100px;font-size:.68rem;font-weight:600;}
.rkt{font-size:.75rem;letter-spacing:1px;}
/* bar col */
.rbar-col{padding-right:12px;}
.rbar-wrap{display:flex;align-items:center;gap:6px;}
.rbar-track{flex:1;height:5px;background:var(--bg);border-radius:3px;overflow:hidden;}
.rbar-fill{height:100%;border-radius:3px;transition:width .6s cubic-bezier(.4,0,.2,1);}
.rbar-pct{font-size:.68rem;color:var(--text-tertiary);font-weight:600;min-width:28px;text-align:right;}
/* value cols */
.rval{font-size:.9rem;font-weight:700;text-align:right;}
.rval.green{color:var(--green-dark);}
.rval.muted{color:var(--text-tertiary);font-weight:400;}
.rprem{font-size:.88rem;font-weight:600;text-align:right;color:var(--green-dark);}
.rprem.zero{color:var(--text-tertiary);font-weight:400;}
/* tag */
.tag{display:inline-flex;align-items:center;padding:2px 8px;border-radius:100px;font-size:.67rem;font-weight:600;}
.tag.yes{background:var(--green-light);color:var(--green-dark);}
.tag.no{background:var(--bg);color:var(--text-tertiary);}

/* CHART */
.chart-wrap{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:18px 20px;box-shadow:var(--shadow);margin-bottom:20px;}
.chart-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px;}
.chart-title{font-size:.82rem;font-weight:600;color:var(--text-secondary);}
.leg{display:flex;gap:14px;flex-wrap:wrap;}
.li{display:flex;align-items:center;gap:5px;font-size:.72rem;color:var(--text-tertiary);font-weight:500;}
.ld{width:8px;height:8px;border-radius:2px;flex-shrink:0;}

.ft{font-size:.7rem;color:var(--text-tertiary);text-align:center;margin-top:4px;line-height:1.8;}

.empty{text-align:center;padding:48px 20px;color:var(--text-tertiary);}
.empty-icon{font-size:32px;margin-bottom:8px;}
.empty p{font-size:.85rem;}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="lc">
    <div class="lc-logo">
      <div class="lc-logo-dot">
        <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"/></svg>
      </div>
      <span class="lc-brand">Kit Lanche <span>Express</span></span>
    </div>
    <p>Campanha Antecipados · Acesso restrito</p>
    <input type="password" id="loginPwd" placeholder="Senha" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="lc-btn" onclick="doLogin()">Entrar</button>
    <div class="lc-err" id="loginErr">Senha incorreta. Tente novamente.</div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <nav>
    <div class="nav-brand">
      <div class="nav-logo-box">
        <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"/></svg>
      </div>
      <span class="nav-brand-name">Kit Lanche <span>Express</span></span>
    </div>
    <div class="tabs">
      <button class="tab on" onclick="showTab('adm',this)">⚙ Administração</button>
      <button class="tab" onclick="showTab('dash',this)">🚀 Painel</button>
    </div>
    <div class="nright">
      <span class="ts" id="tsLabel">Nenhum arquivo carregado</span>
      <button class="nbtn primary" onclick="showTab('dash',document.querySelectorAll('.tab')[1])" id="btnVerPainel" style="display:none;">Ver painel →</button>
    </div>
  </nav>

  <main>

    <!-- ADM PAGE -->
    <div class="page on" id="page-adm">
      <div class="adm-grid">

        <div class="card">
          <div class="card-title" style="justify-content:space-between;">
            <span>📂 Upload do arquivo</span>
            <button class="nbtn" id="btnClearCache" onclick="clearCache()" style="display:none;font-size:.7rem;padding:3px 8px;">🗑 Limpar cache</button>
          </div>
          <div id="cacheInfo" style="display:none;margin-bottom:10px;background:var(--green-light);border-radius:var(--r-sm);padding:6px 10px;font-size:.75rem;color:var(--green-dark);font-weight:600;">
            💾 Dados do último carregamento disponíveis
          </div>
          <label class="up" id="uploadZone">
            <span class="up-icon">📊</span>
            <p><strong>Clique para fazer upload</strong> ou arraste</p>
            <small>Fluxo_de_Caixa_2025.xlsx · aba "CR - Contas a Receber"</small>
            <input type="file" id="fileInput" accept=".xlsx,.xls">
          </label>
          <div class="st" id="uploadStatus">
            <span class="st-dot"></span>
            <span id="uploadStatusText"></span>
          </div>
        </div>

        <div>
          <div class="card" style="margin-bottom:16px;">
            <div class="card-title">🔽 Filtros</div>
            <div class="filter-group">
              <label class="filter-label">Mês</label>
              <select class="filter-select" id="filterMes">
                <option value="">Todos os meses</option>
              </select>
            </div>
            <div class="filter-group">
              <label class="filter-label">Ano</label>
              <select class="filter-select" id="filterAno">
                <option value="2026">2026</option>
                <option value="2025">2025</option>
              </select>
            </div>
            <button class="nbtn primary" style="width:100%;margin-top:4px;" onclick="applyFilters()">Aplicar filtros</button>
          </div>

          <div class="card" id="adm-info-card" style="display:none;">
            <div class="card-title">📋 Resumo</div>
            <div id="adm-info"></div>
          </div>
        </div>

      </div>
    </div>

    <!-- DASH PAGE -->
    <div class="page" id="page-dash">
      <div id="dash-content">
        <div class="empty">
          <div class="empty-icon">📋</div>
          <p>Faça upload do arquivo na aba Administração.</p>
        </div>
      </div>
    </div>

  </main>
</div>

<script>
// ── VERIFICAR CACHE AO CARREGAR ──
(function(){
  const saved=localStorage.getItem('kle_ant_data');
  if(saved){
    document.getElementById('btnClearCache').style.display='block';
    document.getElementById('cacheInfo').style.display='block';
  }
})();

// ── LOGIN ──
function doLogin(){
  if(document.getElementById('loginPwd').value==='kle2026'){
    document.getElementById('loginScreen').style.display='none';
    document.getElementById('app').style.display='block';
    // Se já tem dados salvos, abre direto no painel
    const saved=localStorage.getItem('kle_ant_data');
    if(saved){
      try{
        const parsed=JSON.parse(saved);
        RAW=parsed.raw;
        D=[];
        document.getElementById('uploadStatusText').textContent=parsed.fileName+' · '+parsed.count+' pedidos antecipados';
        document.getElementById('uploadStatus').classList.add('show');
        document.getElementById('tsLabel').textContent=parsed.fileName+' · salvo '+parsed.savedAt;
        document.getElementById('btnVerPainel').style.display='block';
        document.getElementById('adm-info-card').style.display='block';
        // popular filtro de meses
        const meses=[...new Set(RAW.map(r=>r.mes))].sort((a,b)=>a-b);
        const sel=document.getElementById('filterMes');
        sel.innerHTML='<option value="">Todos os meses</option>'+meses.map(m=>`<option value="${m}">Mês ${m}</option>`).join('');
        if(meses.length)sel.value=String(meses[meses.length-1]);
        applyFilters();
        // abrir direto no painel
        showTab('dash',document.querySelectorAll('.tab')[1]);
      }catch(e){localStorage.removeItem('kle_ant_data');}
    }
  } else {
    document.getElementById('loginErr').style.display='block';
    document.getElementById('loginPwd').value='';
  }
}

// ── TABS ──
function showTab(id,btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));
  document.getElementById('page-'+id).classList.add('on');
  btn.classList.add('on');
}

// ── CONFIG ──
const VM={
  'Fabiana Armelin':{norm:'Fabiana Armelin',i:'FA',c:'#16a34a',bg:'#dcfce7',tc:'#14532d'},
  'fabiana Armelin':{norm:'Fabiana Armelin',i:'FA',c:'#16a34a',bg:'#dcfce7',tc:'#14532d'},
  'Wendel Monteiro':{norm:'Wendel Monteiro',i:'WM',c:'#2563eb',bg:'#dbeafe',tc:'#1e3a8a'},
  'Wendel':         {norm:'Wendel Monteiro',i:'WM',c:'#2563eb',bg:'#dbeafe',tc:'#1e3a8a'},
  'Douglas Silva':  {norm:'Douglas Silva',  i:'DS',c:'#d97706',bg:'#fef3c7',tc:'#78350f'},
  'Matheus Dias':   {norm:'Matheus Dias',   i:'MD',c:'#7c3aed',bg:'#ede9fe',tc:'#4c1d95'},
};
const COM=new Set(Object.keys(VM));
const INICIO=new Date('2026-04-01');

let RAW=[],D=[],chart=null;

// ── UPLOAD ──
const uz=document.getElementById('uploadZone');
const fi=document.getElementById('fileInput');
uz.addEventListener('dragover',e=>{e.preventDefault();uz.classList.add('drag');});
uz.addEventListener('dragleave',()=>uz.classList.remove('drag'));
uz.addEventListener('drop',e=>{e.preventDefault();uz.classList.remove('drag');loadFile(e.dataTransfer.files[0]);});
fi.addEventListener('change',e=>loadFile(e.target.files[0]));

function toD(v){if(!v)return null;if(v instanceof Date)return v;if(typeof v==='number')return new Date(Math.round((v-25569)*86400*1000));return new Date(v);}
function normKey(k){return String(k).normalize('NFD').replace(/[\u0300-\u036f]/g,'').toUpperCase().trim();}
function findCol(sample,target){const t=normKey(target);return Object.keys(sample).find(k=>normKey(k)===t);}

function loadFile(f){
  if(!f)return;
  const r=new FileReader();
  r.onload=e=>{
    try{
      const wb=XLSX.read(e.target.result,{type:'array',cellDates:true});
      const sn=wb.SheetNames.find(s=>s.includes('CR - Contas a Receber')&&!s.includes('2')&&!s.includes('('));
      if(!sn){alert('Aba "CR - Contas a Receber" não encontrada.');return;}
      processFile(XLSX.utils.sheet_to_json(wb.Sheets[sn],{defval:null}),f.name);
    }catch(err){alert('Erro: '+err.message);}
  };
  r.readAsArrayBuffer(f);
}

function processFile(rows,fn){
  if(!rows.length)return;
  const s=rows[0];
  const cM=findCol(s,'MES'),cA=findCol(s,'ANO'),cP=findCol(s,'PMR EFETIVO');
  const cV=findCol(s,'VENDEDOR'),cC=findCol(s,'CENTRO DE RECEITA');
  const cR=findCol(s,'DATA RECEBIMENTO'),cVal=findCol(s,'VALOR TOTAL');

  RAW=rows.filter(r=>{
    const pmr=Number(r[cP]),v=String(r[cV]||'').trim();
    const centro=String(r[cC]||'').trim().toUpperCase();
    const rec=toD(r[cR]);
    return pmr<0&&COM.has(v)&&centro==='EXPRESS'&&rec&&rec>=INICIO;
  }).map(r=>{
    const v=String(r[cV]).trim(),m=VM[v];
    const mr=r[cM];
    return{mes:mr instanceof Date?mr.getMonth()+1:parseInt(String(mr),10),ano:Number(r[cA]),
           vendedor:m.norm,valor:Number(r[cVal])||0,pmr:Number(r[cP]),m};
  }).filter(r=>!isNaN(r.mes));

  const meses=[...new Set(RAW.map(r=>r.mes))].sort((a,b)=>a-b);
  const sel=document.getElementById('filterMes');
  sel.innerHTML='<option value="">Todos os meses</option>'+meses.map(m=>`<option value="${m}">Mês ${m}</option>`).join('');
  if(meses.length)sel.value=String(meses[meses.length-1]);

  document.getElementById('uploadStatus').classList.add('show');
  document.getElementById('uploadStatusText').textContent=`${fn} · ${RAW.length} pedidos antecipados`;
  const savedAt=new Date().toLocaleString('pt-BR');
  document.getElementById('tsLabel').textContent=`${fn} · salvo ${savedAt}`;
  document.getElementById('btnVerPainel').style.display='block';
  document.getElementById('adm-info-card').style.display='block';
  // Salvar no localStorage
  try{
    localStorage.setItem('kle_ant_data',JSON.stringify({raw:RAW,fileName:fn,count:RAW.length,savedAt}));
  }catch(e){console.warn('localStorage cheio, não foi possível salvar.');}
  applyFilters();
}

function applyFilters(){
  const mes=document.getElementById('filterMes').value;
  const ano=document.getElementById('filterAno').value;
  D=RAW.filter(r=>(mes?r.mes===parseInt(mes):true)&&(ano?r.ano===parseInt(ano):true));
  const tA=D.reduce((s,r)=>s+r.valor,0);
  const mesTxt=mes?`Mês ${mes}`:'Todos';
  document.getElementById('adm-info').innerHTML=`
    <div class="info-row"><span class="info-key">Filtro ativo</span><span class="info-val">${mesTxt} · ${ano}</span></div>
    <div class="info-row"><span class="info-key">Pedidos elegíveis</span><span class="info-val green">${D.length}</span></div>
    <div class="info-row"><span class="info-key">Total antecipado</span><span class="info-val green">${brl(tA)}</span></div>
    <div class="info-row"><span class="info-key">Premiação estimada</span><span class="info-val">${brl(tA*0.02)}</span></div>
    <div class="info-row"><span class="info-key">Atualizado</span><span class="info-val">${new Date().toLocaleString('pt-BR')}</span></div>
  `;
  renderDash();
}

// ── FORMATAÇÃO ──
const brl=v=>v.toLocaleString('pt-BR',{style:'currency',currency:'BRL',minimumFractionDigits:2,maximumFractionDigits:2});
const rkt=v=>{if(v<=0)return '';return '🚀'.repeat(Math.min(Math.ceil(v/10000),5));};
const pmrBadge=p=>{
  const[bg,tc]=p<-10?['#dcfce7','#14532d']:p<-3?['#dbeafe','#1e3a8a']:['#fef3c7','#78350f'];
  return `<span class="pmrb" style="background:${bg};color:${tc};">${p.toFixed(1)} d</span>`;
};

function getVD(){
  const mp={};
  D.forEach(r=>{
    if(!mp[r.vendedor])mp[r.vendedor]={vendedor:r.vendedor,m:r.m,ant:0,cnt:0,ps:0};
    mp[r.vendedor].ant+=r.valor;mp[r.vendedor].cnt++;mp[r.vendedor].ps+=r.pmr;
  });
  return Object.values(mp).map(v=>({...v,pmr:v.cnt>0?v.ps/v.cnt:0,premio:v.ant*.02})).sort((a,b)=>b.ant-a.ant);
}

function renderDash(){
  const vd=getVD();
  const tA=vd.reduce((s,d)=>s+d.ant,0);
  const tP=tA*.02;
  const mes=document.getElementById('filterMes').value;
  const ano=document.getElementById('filterAno').value;
  const mesTxt=mes?`Mês ${mes} · ${ano}`:ano;
  const tTotal=vd.reduce((s,d)=>s+d.ant,0)||1;

  const kpis=`
  <div class="kgrid">
    <div class="kpi green">
      <div class="kpi-top"><span class="klbl">Total antecipado</span><div class="kicon">💰</div></div>
      <div class="kval">${brl(tA)}</div>
      <div class="ksub">${mesTxt}</div>
    </div>
    <div class="kpi blue">
      <div class="kpi-top"><span class="klbl">Premiação total</span><div class="kicon">🏆</div></div>
      <div class="kval">${brl(tP)}</div>
      <div class="ksub">2% sobre antecipado</div>
    </div>
    <div class="kpi">
      <div class="kpi-top"><span class="klbl">Pedidos elegíveis</span><div class="kicon">📦</div></div>
      <div class="kval">${D.length}</div>
      <div class="ksub">PMR &lt; 0 · Express</div>
    </div>
    <div class="kpi amber">
      <div class="kpi-top"><span class="klbl">Vendedores</span><div class="kicon">👤</div></div>
      <div class="kval">${vd.filter(d=>d.ant>0).length}</div>
      <div class="ksub">elegíveis no período</div>
    </div>
  </div>`;

  const tableHead=`
  <div class="rtable">
    <div class="rtable-head">
      <div class="rth"></div>
      <div class="rth">Vendedor</div>
      <div class="rth">Participação</div>
      <div class="rth right">Antecipado</div>
      <div class="rth right">Premiação (2%)</div>
      <div class="rth right">Status</div>
    </div>
    ${vd.length?vd.map((d,i)=>{
      const pct=tTotal>0?(d.ant/tTotal)*100:0;
      const rkts=rkt(d.ant);
      const isFirst=i===0&&d.ant>0;
      return `
      <div class="rrow${isFirst?' first':''}">
        <div class="rpos">${isFirst?'🏆':'#'+(i+1)}</div>
        <div class="rvendor">
          <div class="rav" style="background:${d.m.bg};color:${d.m.tc};">${d.m.i}</div>
          <div>
            <div class="rname">${d.vendedor}</div>
            <div class="rmeta">${pmrBadge(d.pmr)}${rkts?`<span class="rkt">${rkts}</span>`:''}</div>
          </div>
        </div>
        <div class="rbar-col">
          <div class="rbar-wrap">
            <div class="rbar-track"><div class="rbar-fill" style="width:${pct}%;background:${d.m.c};"></div></div>
            <span class="rbar-pct">${pct.toFixed(0)}%</span>
          </div>
        </div>
        <div class="rval ${d.ant>0?'green':'muted'}">${brl(d.ant)}</div>
        <div class="rprem ${d.ant>0?'':'zero'}">${d.ant>0?brl(d.premio):'—'}</div>
        <div style="text-align:right;">
          <span class="tag ${d.ant>0?'yes':'no'}">${d.ant>0?'elegível':'sem antecipado'}</span>
        </div>
      </div>`;
    }).join(''):`<div class="empty" style="padding:32px;"><p>Nenhum dado no período.</p></div>`}
  </div>`;

  const chartSection=`
  <div class="chart-wrap">
    <div class="chart-head">
      <span class="chart-title">Evolução mensal — receita antecipada por vendedor</span>
      <div class="leg" id="chartLegend"></div>
    </div>
    <div style="position:relative;width:100%;height:240px;">
      <canvas id="evolChart" role="img" aria-label="Evolução receita antecipada">Receita antecipada por vendedor por mês.</canvas>
    </div>
  </div>
  <div class="ft">
    Fonte: aba "CR - Contas a Receber" · DATA RECEBIMENTO ≥ 01/04/2026 · CENTRO DE RECEITA = EXPRESS · PMR EFETIVO &lt; 0 ·
    Atualizado em ${new Date().toLocaleString('pt-BR')}
  </div>`;

  document.getElementById('dash-content').innerHTML=kpis+tableHead+chartSection;
  renderChart();
}

function renderChart(){
  const meses=[...new Set(RAW.map(r=>r.mes))].sort((a,b)=>a-b);
  const vens=[...new Set(RAW.map(r=>r.vendedor))];
  const vc={'Fabiana Armelin':'#16a34a','Wendel Monteiro':'#2563eb','Douglas Silva':'#d97706','Matheus Dias':'#7c3aed'};
  const ano=parseInt(document.getElementById('filterAno').value)||2026;

  const datasets=vens.map(v=>({
    label:v.split(' ')[0],
    data:meses.map(m=>{
      const t=RAW.filter(r=>r.mes===m&&r.ano===ano&&r.vendedor===v).reduce((s,r)=>s+r.valor,0);
      return t>0?parseFloat(t.toFixed(2)):null;
    }),
    borderColor:vc[v]||'#888',backgroundColor:(vc[v]||'#888')+'18',
    borderWidth:2,pointRadius:4,pointHoverRadius:6,tension:0.3,fill:false,spanGaps:false,
  }));

  const legEl=document.getElementById('chartLegend');
  if(legEl)legEl.innerHTML=vens.map(v=>`<span class="li"><span class="ld" style="background:${vc[v]||'#888'};"></span>${v.split(' ')[0]}</span>`).join('');

  const ctx=document.getElementById('evolChart');
  if(!ctx)return;
  if(chart)chart.destroy();
  chart=new Chart(ctx,{
    type:'line',
    data:{labels:meses.map(m=>'Mês '+m),datasets},
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{
        legend:{display:false},
        tooltip:{callbacks:{label:c=>` ${c.dataset.label}: ${c.parsed.y!==null?brl(c.parsed.y):'—'}`}}
      },
      scales:{
        y:{beginAtZero:true,grid:{color:'rgba(0,0,0,0.04)'},
           ticks:{font:{size:11,family:'Inter'},color:'#9ca3af',callback:v=>brl(v)}},
        x:{grid:{display:false},ticks:{font:{size:11,family:'Inter'},color:'#9ca3af'}}
      }
    }
  });
}

function clearCache(){
  localStorage.removeItem('kle_ant_data');
  RAW=[];D=[];
  document.getElementById('btnClearCache').style.display='none';
  document.getElementById('cacheInfo').style.display='none';
  document.getElementById('uploadStatus').classList.remove('show');
  document.getElementById('tsLabel').textContent='Nenhum arquivo carregado';
  document.getElementById('btnVerPainel').style.display='none';
  document.getElementById('adm-info-card').style.display='none';
  document.getElementById('dash-content').innerHTML='<div class="empty"><div class="empty-icon">📋</div><p>Faça upload do arquivo na aba Administração.</p></div>';
  showTab('adm',document.querySelectorAll('.tab')[0]);
}
</script>
</body>
